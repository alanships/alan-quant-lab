name: publish

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        # Node 24 runtime; actions/checkout v5 release notes:
        # https://github.com/actions/checkout/releases/tag/v5.0.0
        uses: actions/checkout@v5

      - name: Set up Python
        # Node 24 runtime; actions/setup-python v6 release notes:
        # https://github.com/actions/setup-python/releases/tag/v6.0.0
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry==2.4.0

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Build package
        run: poetry build

      - name: Smoke install wheel
        run: |
          python -m venv .publish-smoke
          . .publish-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -c "import okx_perp_reliable"

      - name: Publish to PyPI
        # Trusted publishing action; release/v1 tracks the current Node runtime.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true
