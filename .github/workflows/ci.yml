name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        # Node 20 runtime; actions/checkout v4 release notes:
        # https://github.com/actions/checkout/releases/tag/v4.0.0
        uses: actions/checkout@v4

      - name: Set up Python
        # Node 20 runtime; actions/setup-python v5 release notes:
        # https://github.com/actions/setup-python/releases/tag/v5.0.0
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry==2.4.0

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache Poetry
        # Node 20 runtime; actions/cache v4 release notes:
        # https://github.com/actions/cache/releases/tag/v4.0.0
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: poetry-lint-${{ runner.os }}-3.12-${{ hashFiles('pyproject.toml', 'poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Run ruff
        run: poetry run ruff check .

      - name: Run black
        run: poetry run black --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - name: Check out repository
        # Node 20 runtime; actions/checkout v4 release notes:
        # https://github.com/actions/checkout/releases/tag/v4.0.0
        uses: actions/checkout@v4

      - name: Set up Python
        # Node 20 runtime; actions/setup-python v5 release notes:
        # https://github.com/actions/setup-python/releases/tag/v5.0.0
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pipx install poetry==2.4.0

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache Poetry
        # Node 20 runtime; actions/cache v4 release notes:
        # https://github.com/actions/cache/releases/tag/v4.0.0
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: poetry-test-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Run unit tests
        run: poetry run pytest tests/unit -v

      - name: Run integration tests
        run: poetry run pytest tests/integration -v

      - name: Run mock tests
        run: poetry run pytest tests/mock -v
